# Configures GitHub's auto-generated release notes (Releases page ->
# "Generate release notes", or `gh release create --generate-notes`).
# Groups changes by PR label; anything unlabeled falls into "Other Changes".

changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
