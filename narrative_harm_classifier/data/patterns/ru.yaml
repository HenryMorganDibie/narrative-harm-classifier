# Russian detection vocabulary. "verified" confidence — same rigor as
# English, not yet reviewed by a native-speaker domain expert. Cyrillic
# script has no meaningful digit-substitution obfuscation equivalent to
# Latin leetspeak, so obfuscation_map is intentionally empty here.

language: ru
confidence: verified

identity_anchors:
  religion:
    - "\\b(христианин|христианка|христиане|мусульманин|мусульманка|мусульмане|еврей|еврейка|евреи|индуист\\w*|буддист\\w*|сикх\\w*|атеист\\w*|католик\\w*|протестант\\w*)\\b"
    - "\\b(ислам|христианство|иудаизм|индуизм|буддизм)\\b"
  race_ethnicity:
    - "\\b(чернокожи\\w*|бел\\w{0,3}\\s|азиат\\w*|латиноамерикан\\w*|араб\\w*|коренн\\w*)\\b"
    - "\\b(африканец|африканцы|европеец|европейцы|китаец|китайцы|мексиканец|мексиканцы|кореец|корейцы|японец|японцы)\\b"
  gender:
    - "\\b(женщин\\w*|мужчин\\w*|небинарн\\w*|трансгендер\\w*|транс)\\b"
    - "\\b(девочк\\w*|мальчик\\w*)\\b"
  national_origin:
    - "\\b(иммигрант\\w*|беженц\\w*|иностранц\\w*|мигрант\\w*)\\b"
    - "\\b(американец|американцы|мексиканец|китаец|русск\\w*|иранец|северокореец)\\b"
  political_affiliation:
    - "\\b(демократ\\w*|республиканец|республиканцы|либерал\\w*|консерватор\\w*|социалист\\w*|коммунист\\w*|фашист\\w*)\\b"
    - "\\b(лев\\w{0,3}\\s|прав\\w{0,3}\\s)\\b"

harm_patterns:
  animalization:
    - "\\b(паразит\\w*|таракан\\w*|крыс\\w*|вредител\\w*|животн\\w*|звер\\w*|дикар\\w*|недочеловек\\w*)\\b"
    - "\\b(киша[тщ]\\w*|нашестви\\w*)\\b"
    - "менее чем люди"
    - "даже не люди"
  demonization:
    - "\\b(демоническ\\w*|сатанинск\\w*|зл\\w{0,3}\\s|дьявол\\w*|зловещ\\w*|порочн\\w*)\\b"
    - "чистое зло"
  objectification:
    - "\\b(объект\\w*|собственност\\w*|владени\\w*)\\b"
    - "существу\\w+ только чтобы (служить|угождать|использовать)"
    - "просто (объект|вещь|инструмент)"
  criminalization:
    - "\\bвсе .{0,20} (преступники|насильники|убийцы|воры|террористы)\\b"
    - "\\b(несут преступность|несут наркотики|преступники и насильники)\\b"
    - "\\bдепортировать всех\\b"
  direct_call_to_violence:
    - "\\b(атаковать|убить|уничтожить|истребить)\\b.{0,30}\\b(их)\\b"
    - "\\bпора (бороться|атаковать|устранить)\\b"
    - "\\bдолжны (умереть|быть уничтожены)\\b"
  false_attribution:
    - "\\bвсе тайно хотят\\b"
    - "\\bих (истинная|тайная) повестка\\b"

negation_cues:
  - "не"
  - "никогда"
  - "уже не"
  - "это ложь, что"
  - "неправда, что"

reporting_cues:
  - "некоторые говорят"
  - "некоторые комментаторы"
  - "называть их"
  - "те, кто говорит"

condemnation_cues:
  - "опасно"
  - "опасный"
  - "предвзято"
  - "чушь"
  - "нравственная катастрофа"
  - "распространяет ложь"
  - "привело к насилию"
  - "это ложь"
  - "это неправда"

benign_context_cues:
  - "борьба с вредителями"
  - "насекомые"
  - "дикая природа"
  - "документальный фильм"
  - "фильм ужасов"
  - "кинокритик"
  - "видеоигра"
  - "курсы самообороны"
  - "академическ"
  - "теория"
  - "статистика"
  - "политические дебаты"

obfuscation_map: {}
