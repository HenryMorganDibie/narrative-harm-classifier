name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Run unit + integration tests
        run: pytest tests/unit tests/integration -v

      - name: Run benchmark suite (informational — see nhc benchmark run output)
        run: python -m narrative_harm_classifier.cli benchmark run

      - name: Run benchmark structural tests
        run: pytest tests/benchmark -v

  milestone-gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Enforce Phase 1 milestone gate (dehumanization precision/recall/FPR)
        run: pytest tests/integration/test_validation.py -v
