name: Deploy docs + coverage report to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (dev + docs extras)
        run: pip install -e ".[dev,docs]"

      - name: Build MkDocs site
        # Not --strict: CONTRIBUTING.md/CHANGELOG.md are single-sourced via snippet include and
        # contain links (README.md#..., scripts/...) that are correct when read on GitHub directly
        # but unresolvable within the docs site's isolated file tree. coverage.md also links to a
        # coverage/index.html generated by the next step, which doesn't exist yet at build time.
        run: mkdocs build --site-dir public

      - name: Generate coverage HTML report
        run: |
          pytest tests/unit tests/integration tests/api \
            --cov=narrative_harm_classifier --cov-report=html:public/coverage
        env:
          # Coverage run needs a writable working directory for its SQLite tracking DB.
          DATABASE_URL: sqlite:///./dev.db

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
